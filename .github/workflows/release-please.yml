name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Detect release token
        id: gate
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -n "$RELEASE_PLEASE_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-please
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Report missing release token
        if: ${{ steps.gate.outputs.enabled != 'true' }}
        run: |
          echo "::warning title=Release automation paused::Set the repository secret RELEASE_PLEASE_TOKEN to activate Release Please. This organization disables workflow write permissions for the default GITHUB_TOKEN, so release PR creation cannot work without a PAT-backed secret."
